openapi: 3.0.0
info:
  title: BadaBazaar Auth API
  description: Authentication API for BadaBazaar backend.
  version: 1.0.0
servers:
  - url: http://localhost:7879/api/v1/badabazaar
    description: Local backend server (adjust the port and /api/v1 baseUrl to match your .env BASE_URL)
paths:
  /auth/login:
    post:
      summary: User Login
      description: Authenticate a user with email and password.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: securepassword123
      responses:
        '200':
          description: Successful authentication
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Set accessToken and refreshToken cookies
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
              examples:
                Success:
                  summary: Logged in successfully
                  value:
                    success: true
                    message: User logged in successfully
        '400':
          description: Validation Error (Zod)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Invalid email or pas sword
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: REDIRECT_TO_REGISTER
  /auth/register:
    post:
      summary: User Registration
      description: Register a new user with their email, password, and full name.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - firstName
                - lastName
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  description: Must be at least 8 characters long
                  example: securepassword123
                firstName:
                  type: string
                  example: John
                lastName:
                  type: string
                  example: Doe
      responses:
        '200':
          description: User registered successfully
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Set accessToken and refreshToken cookies
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User created successfully
        '400':
          description: Validation Error or User already exists
  /auth/refresh:
    post:
      summary: Refresh Tokens
      description: Rotates the access and refresh tokens. Requires userId in the body and refreshToken in the cookies.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  example: "018e7e1..."
      responses:
        '200':
          description: Tokens refreshed successfully
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Rotated accessToken and refreshToken cookies
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User refresh and access token rotated successfully
        '400':
          description: Validation Error (Zod)
        '401':
          description: Unauthorized (Invalid or expired refresh token)
